<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rande? （づ￣3￣）づ╭❤️～</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Century Gothic', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #9c0000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .window {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 700px;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .window.active {
            display: flex;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        /* Styl pro Login okno */
        .login-group {
            margin-top: 20px;
            width: 100%;
            max-width: 250px;
            text-align: left;
        }

        .login-group label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .login-group input {
            width: 100%;
            font-size: 16px;
            padding: 10px;
            border-radius: 12px;
            border: none;
            color: black;
            background-color: white;
            margin-bottom: 15px;
        }

        #login-error {
            color: #ffb6c1;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            min-height: 20px;
        }

        .gif-container {
            border: 5px solid black;
            background: white;
            line-height: 0;
            margin-bottom: 20px;
            max-width: 90%;
        }

        .gif-container img {
            max-width: 100%;
            height: auto;
        }

        .btn {
            background-color: white;
            color: black;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            padding: 12px 24px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:active {
            background-color: #ffb6c1;
        }

        .main-buttons {
            display: flex;
            gap: 40px;
            margin-top: auto;
            margin-bottom: 80px;
            width: 100%;
            max-width: 400px;
            height: 60px;
            justify-content: center;
            position: relative;
        }

        #btn-no {
            position: absolute;
            z-index: 10;
            left: calc(50% + 20px);
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }

        #btn-yes {
            position: absolute;
            right: calc(50% + 20px);
        }

        .form-group {
            margin-top: 25px;
            width: 100%;
        }

        .form-group label {
            font-size: 18px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .form-group input[type="date"] {
            font-size: 16px;
            padding: 8px;
            border-radius: 8px;
            border: none;
            width: 180px;
            text-align: center;
        }

        .time-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .time-picker select {
            font-size: 16px;
            padding: 8px;
            border-radius: 8px;
            border: none;
            width: 70px;
        }

        .time-colon {
            font-size: 24px;
            font-weight: bold;
        }

        .info-box {
            margin-top: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            padding: 15px;
            border-radius: 10px;
            width: 85%;
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            line-height: 1.5;
        }

        .info-box.error-status {
            color: #ffb6c1;
            font-style: italic;
        }

        .checkbox-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 15px;
            font-weight: bold;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: #ffb6c1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 140px);
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
        }

        .grid-btn {
            background-color: white;
            color: black;
            border: none;
            border-radius: 15px;
            padding: 15px 5px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .grid-btn img {
            width: 50px;
            height: auto;
        }

        .grid-btn:active {
            background-color: #ffb6c1;
        }

        #label-result {
            margin-top: auto;
            margin-bottom: 40px;
            font-size: 18px;
            font-weight: bold;
            max-width: 90%;
            color: white;
            padding: 10px;
            border-radius: 10px;
        }

        .bottom-nav {
            margin-top: auto;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="win0" class="window active">
        <h1 style="margin-top: 100px; margin-bottom: 30px;">Ahoj kotě, nejdřív se přihlas: ❤️</h1>
        
        <div class="login-group">
            <label for="username">Uživatelské jméno:</label>
            <input type="text" id="username" autocomplete="off">
            
            <label for="password">Heslo:</label>
            <input type="password" id="password">
        </div>
        
        <div id="login-error"></div>
        
        <button class="btn" style="width: 160px; margin-top: 20px;" onclick="handleLogin()">Přihlásit se</button>
    </div>

    <div id="win1" class="window">
        <h1>Chceš jít na rande?</h1>
        <div class="gif-container">
            <img src="hang-out.gif" alt="Nebylo možné načíst GIF">
        </div>
        <div class="main-buttons">
            <button id="btn-yes" class="btn" style="width: 100px; height: 40px;" onclick="nextWindow(2)">ANO</button>
            <button id="btn-no" class="btn" style="width: 100px; height: 40px;">NE</button>
        </div>
    </div>

    <div id="win2" class="window">
        <h1>Takže ty accually chceš jo 👀</h1>
        <div class="form-group">
            <label>Dobře tak vyber datum:</label>
            <input type="date" id="date-input">
        </div>
        <div class="form-group">
            <label>Vyber čas:</label>
            <div class="time-picker">
                <select id="hour-select"></select>
                <div class="time-colon">:</div>
                <select id="minute-select"></select>
            </div>
        </div>
        <div id="info-box-win2" class="info-box"></div>
        <div class="bottom-nav">
            <button id="btn-confirm" class="btn" style="width: 120px;" onclick="validateDate()">Potvrdit</button>
            <button id="btn-continue-win2" class="btn" style="width: 140px; display: none;" onclick="nextWindow(3)">Pokračovat</button>
        </div>
    </div>

    <div id="win3" class="window">
        <h1>Vyber, kotě, co budeme dělat: ❤️</h1>
        <div class="checkbox-container">
            <div class="checkbox-item">
                <input type="checkbox" id="chk-walk" onchange="updateMenu()">
                <label for="chk-walk">Procházka</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="chk-food" onchange="updateMenu()">
                <label for="chk-food">Jídlo</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="chk-random" onchange="updateMenu()">
                <label for="chk-random">Random Meetup</label>
            </div>
        </div>
        <div id="activity-grid" class="grid-container"></div>
        <div id="label-result"></div>
        <div class="bottom-nav">
            <button class="btn" style="width: 160px;" onclick="validateFinal()">Pokračovat</button>
        </div>
    </div>

    <div id="win4" class="window">
        <h1 style="font-size: 28px; margin-top: 100px; line-height: 1.5;">Máme naplánováno! <br><br> Už se nemůžu dočkat, bby :3.</h1>
        <button class="btn" style="width: 200px; height: 50px; margin-top: 60px;" onclick="sendData()">Poslat a ukončit</button>
    </div>

    <script>
        // --- 100% SPRÁVNÁ A FINÁLNÍ DATA WEBHUOKŮ ---
        const UZIVATELE = {
            "bby": {
                "heslo": "123",
                "webhook": "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUxNTgwOTEzMDU3MTM2NjYyMS9ud0JCZWtraFZ2VVBpZmllYXAxYzRvQXBsYnhwZGFGRnQ4cnFuZHhQcDB4VzVMQ0xuYUtBd3k5UTQ5UGF2am0zRHkySw=="
            },
            "kamos": {
                "heslo": "heslo456",
                "webhook": "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUxNjMzMDY2NDIzOTAzODUyNS9tVElWNURpU3ZSMUJNX0YwZ1ZyWFR3QVNTOGE2d0lYcTBtOEs5c0FWVlZSSy1naUZMVGR5UG5nV0lySGhzdjREM0lPVw=="
            }
        };

        let aktivniUzivatel = null;
        let ulozenyDatum = "";
        let ulozenyCas = "";
        let vybranaAktivita = "Jen Procházka";
        let activitySelected = false;

        // KOREKTNÍ POST FUNKCE S JSON FORMÁTEM, KTERÝ DISCORD VYŽADUJE
        function poslatZpravuDiscord(text) {
            if (!aktivniUzivatel || !UZIVATELE[aktivniUzivatel]) return;
            
            const encryptedUrl = UZIVATELE[aktivniUzivatel]["webhook"];
            const webhookUrl = atob(encryptedUrl);

            if (webhookUrl && webhookUrl.startsWith("https://discord")) {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' // Discord striktně vyžaduje tuto hlavičku pro JSON payloady!
                    },
                    body: JSON.stringify({ content: text })
                })
                .then(res => {
                    if(!res.ok) console.error("Discord vrátil chybu statusu:", res.status);
                })
                .catch(err => console.error("Chyba spojení:", err));
            }
        }

        function handleLogin() {
            const userIn = document.getElementById("username").value.trim();
            const passIn = document.getElementById("password").value.trim();
            const errorLabel = document.getElementById("login-error");

            if (UZIVATELE[userIn] && UZIVATELE[userIn]["heslo"] === passIn) {
                aktivniUzivatel = userIn;
                errorLabel.innerHTML = "";
                
                poslatZpravuDiscord(`⚠️ **Uživatel \`${aktivniUzivatel}\` se právě přihlásil do aplikace! 👀**`);
                nextWindow(1);
            } else {
                errorLabel.innerHTML = "Špatné jméno nebo heslo, zkus to znova bby! 😭";
            }
        }

        // Pohyb tlačítka NE
        const btnNo = document.getElementById('btn-no');
        btnNo.style.left = 'calc(50% + 20px)';
        btnNo.style.top = '0px';

        function moveNoButton(e) {
            e.preventDefault();
            const container = document.querySelector('.main-buttons');
            const containerWidth = container.offsetWidth;
            const containerHeight = container.offsetHeight || 100;

            const buttonWidth = 100;
            const buttonHeight = 40;

            const maxX = containerWidth - buttonWidth - 10;
            const maxY = containerHeight - buttonHeight - 10;
            const minX = 10;
            const minY = -200;

            let newLeft = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
            let newTop = Math.floor(Math.random() * (maxY - minY + 1)) + minY;

            btnNo.style.position = 'absolute';
            btnNo.style.left = newLeft + 'px';
            btnNo.style.top = newTop + 'px';
        }

        btnNo.addEventListener('touchstart', moveNoButton);
        btnNo.addEventListener('mouseover', moveNoButton);

        function nextWindow(winNum) {
            document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
            document.getElementById('win' + winNum).classList.add('active');
        }

        // Generování času
        const hourSelect = document.getElementById('hour-select');
        const minuteSelect = document.getElementById('minute-select');
        
        for(let h=7; h<=22; h++) {
            let opt = document.createElement('option');
            let val = h.toString().padStart(2, '0');
            opt.value = val; opt.textContent = val;
            if(val === "18") opt.selected = true;
            hourSelect.appendChild(opt);
        }
        for(let m=0; m<60; m+=5) {
            let opt = document.createElement('option');
            let val = m.toString().padStart(2, '0');
            opt.value = val; opt.textContent = val;
            minuteSelect.appendChild(opt);
        }

        // Nastavení výchozího dnešního data
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        document.getElementById('date-input').value = `${yyyy}-${mm}-${dd}`;

        function validateDate() {
            const dateInput = document.getElementById('date-input').value;
            const infoBox = document.getElementById('info-box-win2');
            const btnContinue = document.getElementById('btn-continue-win2');
            
            if(!dateInput) {
                infoBox.innerHTML = "Musíš vybrat platné datum!";
                infoBox.classList.add('error-status');
                infoBox.style.display = "flex";
                btnContinue.style.display = "none";
                return;
            }

            const selectedDateTime = new Date(`${dateInput}T${hourSelect.value}:${minuteSelect.value}:00`);
            const now = new Date();

            infoBox.style.display = "flex";

            const selectedDateOnly = new Date(dateInput);
            selectedDateOnly.setHours(0,0,0,0);
            const todayDateOnly = new Date();
            todayDateOnly.setHours(0,0,0,0);

            if (selectedDateOnly < todayDateOnly) {
                infoBox.innerHTML = "Nemůžeš zadat datum,<br>který už byl BBy girl :D";
                infoBox.classList.add('error-status');
                btnContinue.style.display = "none";
                return;
            }

            if (selectedDateOnly.getTime() === todayDateOnly.getTime()) {
                const triHodinyVPrachu = 3 * 60 * 60 * 1000;
                if (selectedDateTime - now <= triHodinyVPrachu) {
                    infoBox.innerHTML = "Babyyyy fakt rád bych došel,<br>ale bohužel nemůžu :\\<br>zkus vybrat něco přijatelnějšího ju?";
                    infoBox.classList.add('error-status');
                    btnContinue.style.display = "none";
                    return;
                }
            }

            ulozenyDatum = dateInput;
            ulozenyCas = `${hourSelect.value}:${minuteSelect.value}`;
            
            infoBox.innerHTML = `Dobře naše rande bude<br>${ulozenyDatum} v ${ulozenyCas} :D,<br>už se těším`;
            infoBox.classList.remove('error-status');
            btnContinue.style.display = "inline-block";
        }

        const chkWalk = document.getElementById('chk-walk');
        const chkFood = document.getElementById('chk-food');
        const chkRandom = document.getElementById('chk-random');
        const activityGrid = document.getElementById('activity-grid');
        const labelResult = document.getElementById('label-result');

        function updateMenu() {
            activitySelected = false;
            activityGrid.innerHTML = "";
            labelResult.innerHTML = "";

            if (chkRandom.checked) {
                chkWalk.checked = false;
                chkFood.checked = false;
                chkWalk.disabled = true;
                chkFood.disabled = true;

                createGridButton("Kino 🎬", "Kino");
                createGridButton("Divadlo 🎭", "Divadlo");
                createGridButton("Club 🍻", "Club");
            } else {
                chkWalk.disabled = false;
                chkFood.disabled = false;

                if (chkFood.checked) {
                    createGridButton("Sushi 🍣", "Sushi", "sushi.png");
                    createGridButton("Fast Food 🍔", "Fast Food", "fast_food.png");
                    createGridButton("Kebab 🌯", "Kebab", "kebab.png");
                    createGridButton("Restaurace 🥂", "hezkou romantickou restauraci");
                } else if (chkWalk.checked) {
                    labelResult.innerHTML = "Procházka zní super!<br> Ať už půjdeme kamkoliv Baby &lt;3 :D";
                    vybranaAktivita = "Procházka";
                }
            }
        }

        function createGridButton(text, codeName, imgSrc = null) {
            const btn = document.createElement('button');
            btn.className = 'grid-btn';
            
            if (imgSrc) {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.alt = text;
                btn.appendChild(img);
            }
            
            const span = document.createElement('span');
            span.textContent = text;
            btn.appendChild(span);

            btn.onclick = () => {
                activitySelected = true;
                vybranaAktivita = codeName;
                if (chkWalk.checked) {
                    labelResult.innerHTML = `Takže ${codeName}<br>a pak jdeme na romantickou večeři.`;
                } else if (chkFood.checked) {
                    labelResult.innerHTML = `Mňam!<br>Jdeme na ${codeName}.<br>už se mi sbíhají sliny. 😋`;
                } else {
                    labelResult.innerHTML = `Random Meetup ${codeName}?<br>To bude boží 🤣🤣 už se těším.`;
                }
            };

            activityGrid.appendChild(btn);
        }

        function validateFinal() {
            if (!chkRandom.checked && !chkWalk.checked && !chkFood.checked) {
                labelResult.innerHTML = "Musíš vybrat alespoň jednu věc";
                return;
            }
            if ((chkFood.checked || chkRandom.checked) && !activitySelected) {
                labelResult.innerHTML = "Musíš vybrat alespoň nějakou aktivitu!";
                return;
            }
            nextWindow(4);
        }

        function sendData() {
            poslatZpravuDiscord(`❤️ **NOVÉ RANDE NAPLÁNOVÁNO UŽIVATELEM \`${aktivniUzivatel}\`!** ❤️\n📅 **Datum:** ${ulozenyDatum}\n⏰ **Čas:** ${ulozenyCas}\n🍕 **Aktivita:** ${vybranaAktivita}`);
            
            alert("Úspěšně odesláno na Discord! 😉");
            
            // Reset stránky na začátek
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            chkWalk.checked = false; chkFood.checked = false; chkRandom.checked = false;
            chkWalk.disabled = false; chkFood.disabled = false;
            activityGrid.innerHTML = ""; labelResult.innerHTML = "";
            document.getElementById('info-box-win2').style.display = "none";
            document.getElementById('btn-continue-win2').style.display = "none";
            activitySelected = false; vybranaAktivita = "Jen Procházka";
            
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            document.getElementById('date-input').value = `${yyyy}-${mm}-${dd}`;
            
            document.getElementById('hour-select').value = "18";
            document.getElementById('minute-select').value = "00";
            aktivniUzivatel = null;
            
            nextWindow(0);
        }
    </script>
</body>
</html>
